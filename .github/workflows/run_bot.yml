name: build

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 * * * *' # Exécution toutes les heures (optionnel)
  workflow_dispatch: # Permet de lancer le bot manuellement

jobs:
  build:
    runs-on: ubuntu-latest
    
    # CETTE SECTION EST CRUCIALE POUR CORRIGER L'ERREUR 403
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Bot
        run: python bot.py

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add seen_videos.json
          # On vérifie s'il y a des changements avant de commit pour éviter une erreur
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update seen videos" && git push)
