name: TikTok Bot Weekly
on:
  schedule:
    - cron: '*/30 * * * *' # S'exécute toutes les 30 minutes
  workflow_dispatch: # Permet de le lancer à la main pour tester

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python bot.py

      - name: Commit changes # Pour sauvegarder les vidéos déjà vues
        run: |
          git config --global user.name 'bot-github'
          git config --global user.email 'bot@github.com'
          git add seen_videos.json
          git commit -m "Update seen videos" || exit 0
          git push
